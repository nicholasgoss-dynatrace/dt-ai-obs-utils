services:

  # ── OneAgent (auto-instrumentation, zero code changes) ──────────────────────
  # Port: http://localhost:8001/ask
  # Host-level OneAgent instruments this container via LD_PRELOAD code-module injection.
  # The OneAgent libraries and IPC socket are mounted from the host so liboneagentproc.so
  # can register with the host agent without requiring ptrace across namespace boundaries
  # (which fails for rootless Podman). No PaaS token needed — OneAgent is already on the host.
  oneagent:
    build:
      context: .
      dockerfile: Dockerfile.oneagent
    platform: linux/amd64   # OneAgent has no ARM Linux build; runs via Rosetta on Apple Silicon
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - LD_PRELOAD=/usr/lib64/liboneagentproc.so
      - CONTAINER_NAME=dt-ai-obs-test_oneagent_1  # triggers OneAgent injection rule -41
    volumes:
      # Preload library — must match what's in /etc/ld.so.preload on the host
      - /usr/lib64/liboneagentproc.so:/usr/lib64/liboneagentproc.so:ro
      # IPC socket — liboneagentproc.so connects here to register with the host agent
      - /var/lib/dynatrace/oneagent/agent/config:/var/lib/dynatrace/oneagent/agent/config
      # Agent binaries — host agent uses these to push liboneagentpython.so into the process
      - /opt/dynatrace/oneagent/agent/bin:/opt/dynatrace/oneagent/agent/bin:ro

  # ── OpenLLMetry (traceloop-sdk, sends OTLP directly to Dynatrace) ───────────
  # Port: http://localhost:8002/ask
  openllmetry:
    build:
      context: .
      dockerfile: Dockerfile.openllmetry
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      - SERVICE_NAME=${SERVICE_NAME:-dt-ai-obs-openllmetry}
      - TRACELOOP_TRACE_CONTENT=true

  # ── OpenInference (openinference-instrumentation-openai + OTel Collector) ───
  # Port: http://localhost:8003/ask
  # Sends spans to the otel-collector service, which normalizes attrs to gen_ai.*
  # and forwards to Dynatrace.
  # To use OpenPipeline instead (no Collector): comment out depends_on and change
  # OTEL_EXPORTER_OTLP_ENDPOINT to ${DT_ENDPOINT}/api/v2/otlp
  openinference:
    build:
      context: .
      dockerfile: Dockerfile.openinference
    ports:
      - "8003:8000"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - SERVICE_NAME=${SERVICE_NAME:-dt-ai-obs-openinference}
    depends_on:
      - otel-collector

  # ── OTel Collector (normalizes OpenInference attrs → gen_ai.*) ───────────────
  # Not needed if using OpenPipeline for the openinference service.
  otel-collector:
    image: ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    environment:
      - DT_ENDPOINT=${DT_ENDPOINT}
      - DT_API_TOKEN=${DT_API_TOKEN}
    ports:
      - "4318:4318"
