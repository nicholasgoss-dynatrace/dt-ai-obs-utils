# OTel Collector config for OpenInference → Dynatrace normalization
# Transforms OpenInference attribute conventions to gen_ai.* so that
# Dynatrace AI Observability can understand the spans.
#
# Start the collector:
#   docker run -d --name otel-collector -p 4318:4318 \
#     -v $(pwd)/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:ro \
#     -e DT_ENDPOINT=$DT_ENDPOINT \
#     -e DT_API_TOKEN=$DT_API_TOKEN \
#     ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector:latest \
#     --config=/etc/otelcol/otel-collector-config.yaml

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

  transform/openinference:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # ── span kind → gen_ai.operation.name ──────────────────────────────
          - set(attributes["gen_ai.operation.name"], "execute_agent")   where attributes["openinference.span.kind"] == "CHAIN"
          - set(attributes["gen_ai.operation.name"], "execute_tool")    where attributes["openinference.span.kind"] == "TOOL"
          - set(attributes["gen_ai.operation.name"], "execute_agent")   where attributes["openinference.span.kind"] == "AGENT"
          - set(attributes["gen_ai.operation.name"], "process_document") where attributes["openinference.span.kind"] == "RETRIEVER"
          - set(attributes["gen_ai.operation.name"], "guardrail")       where attributes["openinference.span.kind"] == "GUARDRAIL"
          - set(attributes["gen_ai.operation.name"], "chat")            where attributes["openinference.span.kind"] == "LLM"
          - set(attributes["gen_ai.operation.name"], "rerank")          where attributes["openinference.span.kind"] == "RERANKER"
          # Fallback for any unmapped OpenInference span kinds
          - set(attributes["gen_ai.operation.name"], "execute_agent") where attributes["openinference.span.kind"] != nil and attributes["gen_ai.operation.name"] == nil

          # ── model name ─────────────────────────────────────────────────────
          - set(attributes["gen_ai.request.model"], attributes["llm.model_name"])       where attributes["llm.model_name"] != nil
          - set(attributes["gen_ai.request.model"], attributes["embedding.model_name"]) where attributes["embedding.model_name"] != nil
          - set(attributes["gen_ai.request.model"], attributes["reranker.model_name"])  where attributes["reranker.model_name"] != nil
          # Mirror request model to response model (OpenInference has no separate field)
          - set(attributes["gen_ai.response.model"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil

          # ── provider ───────────────────────────────────────────────────────
          - set(attributes["gen_ai.provider.name"], attributes["llm.provider"]) where attributes["llm.provider"] != nil
          - set(attributes["gen_ai.provider.name"], attributes["llm.system"])   where attributes["llm.system"] != nil and attributes["llm.provider"] == nil
          - set(attributes["gen_ai.system"], "azure.ai.openai") where attributes["gen_ai.provider.name"] == "azure"
          - set(attributes["gen_ai.system"], "anthropic")       where attributes["gen_ai.provider.name"] == "Anthropic"
          - set(attributes["gen_ai.system"], "anthropic")       where attributes["gen_ai.provider.name"] == "anthropic"

          # ── operation name ─────────────────────────────────────────────────
          - set(attributes["gen_ai.operation.name"], "chat")       where attributes["llm.model_name"] != nil
          - set(attributes["gen_ai.operation.name"], "embeddings") where attributes["embedding.model_name"] != nil

          # ── token counts ───────────────────────────────────────────────────
          - set(attributes["gen_ai.usage.input_tokens"],  attributes["llm.token_count.prompt"])     where attributes["llm.token_count.prompt"] != nil
          - set(attributes["gen_ai.usage.output_tokens"], attributes["llm.token_count.completion"]) where attributes["llm.token_count.completion"] != nil

          # ── request parameters ─────────────────────────────────────────────
          - set(attributes["gen_ai.request.temperature"], attributes["llm.temperature"])  where attributes["llm.temperature"] != nil
          - set(attributes["gen_ai.request.max_tokens"],  attributes["llm.max_tokens"])   where attributes["llm.max_tokens"] != nil
          - set(attributes["gen_ai.request.top_p"],       attributes["llm.top_p"])        where attributes["llm.top_p"] != nil

          # ── finish reason ──────────────────────────────────────────────────
          - set(attributes["gen_ai.response.finish_reasons"], attributes["llm.finish_reason"]) where attributes["llm.finish_reason"] != nil

          # ── agent / tool / guardrail ───────────────────────────────────────
          - set(attributes["gen_ai.agent.name"],        attributes["agent.name"])        where attributes["agent.name"] != nil
          - set(attributes["gen_ai.tool.name"],         attributes["tool.name"])         where attributes["tool.name"] != nil
          - set(attributes["gen_ai.tool.description"],  attributes["tool.description"])  where attributes["tool.description"] != nil
          - set(attributes["gen_ai.guardrail.name"],    attributes["validator_name"])    where attributes["validator_name"] != nil

          # ── input / output messages (fallback) ─────────────────────────────
          - set(attributes["gen_ai.input.messages"],  attributes["input.value"])  where attributes["input.value"] != nil
          - set(attributes["gen_ai.output.messages"], attributes["output.value"]) where attributes["output.value"] != nil

          # ── source tag (allows filtering in DQL) ───────────────────────────
          - set(attributes["ai.observability.source"], "openinference")

exporters:
  otlphttp:
    endpoint: "${DT_ENDPOINT}/api/v2/otlp"
    headers:
      Authorization: "Api-Token ${DT_API_TOKEN}"

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch, transform/openinference]
      exporters:  [otlphttp]
